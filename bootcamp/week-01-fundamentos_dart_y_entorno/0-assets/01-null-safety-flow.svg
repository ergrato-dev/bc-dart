<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>Flujo de decisión de null safety en Dart</title>
  <desc>Diagrama: desde declarar una variable, decidir si es nullable, y qué operador usar en cada caso (?., ??, ??=, !)</desc>

  <rect width="900" height="360" fill="#0d1117"/>

  <!-- Nodo inicial -->
  <rect x="360" y="20" width="180" height="48" rx="8" fill="#161b22" stroke="#40C4FF" stroke-width="1.5"/>
  <text x="450" y="49" fill="#ffffff" font-size="14" text-anchor="middle">¿Puede faltar el dato?</text>

  <!-- Flecha izquierda: No -->
  <line x1="400" y1="68" x2="200" y2="120" stroke="#3fb950" stroke-width="2"/>
  <text x="270" y="90" fill="#3fb950" font-size="12">No</text>

  <!-- Flecha derecha: Sí -->
  <line x1="500" y1="68" x2="700" y2="120" stroke="#d29922" stroke-width="2"/>
  <text x="640" y="90" fill="#d29922" font-size="12">Sí</text>

  <!-- Caja: tipo no-nulable -->
  <rect x="90" y="120" width="220" height="60" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="200" y="145" fill="#ffffff" font-size="13" text-anchor="middle" font-weight="700">String title</text>
  <text x="200" y="165" fill="#8b949e" font-size="11" text-anchor="middle">tipo no-nulable</text>

  <!-- Caja: tipo nullable -->
  <rect x="590" y="120" width="220" height="60" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="700" y="145" fill="#ffffff" font-size="13" text-anchor="middle" font-weight="700">DateTime? dueDate</text>
  <text x="700" y="165" fill="#8b949e" font-size="11" text-anchor="middle">tipo nullable</text>

  <!-- De nullable, tres ramas: ?. / ?? / ! -->
  <line x1="700" y1="180" x2="700" y2="215" stroke="#30363d" stroke-width="1.5"/>

  <!-- ?. -->
  <rect x="570" y="220" width="120" height="90" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="630" y="248" fill="#40C4FF" font-size="16" text-anchor="middle" font-weight="700">?.</text>
  <text x="630" y="270" fill="#e6edf3" font-size="11" text-anchor="middle">acceso seguro</text>
  <text x="630" y="286" fill="#8b949e" font-size="10" text-anchor="middle">corta si es null</text>
  <text x="630" y="300" fill="#8b949e" font-size="10" text-anchor="middle">resultado: null</text>

  <!-- ?? -->
  <rect x="710" y="220" width="120" height="90" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="770" y="248" fill="#40C4FF" font-size="16" text-anchor="middle" font-weight="700">??</text>
  <text x="770" y="270" fill="#e6edf3" font-size="11" text-anchor="middle">valor por</text>
  <text x="770" y="284" fill="#e6edf3" font-size="11" text-anchor="middle">defecto</text>
  <text x="770" y="300" fill="#8b949e" font-size="10" text-anchor="middle">recomendado</text>

  <!-- ! peligroso -->
  <rect x="440" y="220" width="120" height="90" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <text x="500" y="248" fill="#f85149" font-size="16" text-anchor="middle" font-weight="700">!</text>
  <text x="500" y="270" fill="#e6edf3" font-size="11" text-anchor="middle">"confío en que</text>
  <text x="500" y="284" fill="#e6edf3" font-size="11" text-anchor="middle">no es null"</text>
  <text x="500" y="300" fill="#f85149" font-size="10" text-anchor="middle">riesgo: crash runtime</text>

  <line x1="700" y1="180" x2="500" y2="220" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Leyenda -->
  <text x="90" y="340" fill="#7d8590" font-size="11">Solo usa </text>
  <text x="140" y="340" fill="#f85149" font-size="11" font-weight="700">!</text>
  <text x="150" y="340" fill="#7d8590" font-size="11"> cuando puedas justificar por qué el valor NUNCA es null en ese punto.</text>
</svg>
