<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>Un closure capturando una variable del scope externo</title>
  <desc>Diagrama de flujo: makeCounter declara count y retorna una función interna que la captura; dos llamadas independientes a makeCounter producen dos closures con estado propio</desc>

  <rect width="800" height="500" fill="#0d1117"/>

  <text x="400" y="36" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">Closure: captura de variable externa</text>

  <!-- Caja makeCounter -->
  <rect x="260" y="64" width="280" height="110" rx="10" fill="#161b22" stroke="#40C4FF" stroke-width="1.5"/>
  <text x="400" y="90" fill="#40C4FF" font-size="14" text-anchor="middle" font-weight="700">makeCounter()</text>
  <text x="400" y="112" fill="#e6edf3" font-size="12" text-anchor="middle" font-family="monospace">var count = 0;</text>
  <text x="400" y="132" fill="#e6edf3" font-size="12" text-anchor="middle" font-family="monospace">return () { count++; return count; };</text>
  <text x="400" y="154" fill="#8b949e" font-size="11" text-anchor="middle">count queda "capturada" por la función retornada</text>

  <line x1="400" y1="174" x2="400" y2="210" stroke="#30363d" stroke-width="1.5"/>

  <!-- Dos instancias independientes -->
  <text x="230" y="228" fill="#8b949e" font-size="12" text-anchor="middle">1ª llamada</text>
  <text x="570" y="228" fill="#8b949e" font-size="12" text-anchor="middle">2ª llamada</text>

  <line x1="380" y1="200" x2="230" y2="240" stroke="#3fb950" stroke-width="1.5"/>
  <line x1="420" y1="200" x2="570" y2="240" stroke="#d29922" stroke-width="1.5"/>

  <!-- Closure counter -->
  <rect x="90" y="250" width="280" height="130" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="230" y="276" fill="#3fb950" font-size="14" text-anchor="middle" font-weight="700">counter</text>
  <text x="230" y="298" fill="#e6edf3" font-size="12" text-anchor="middle" font-family="monospace">count propio: 0 → 1 → 2</text>
  <text x="230" y="320" fill="#8b949e" font-size="11" text-anchor="middle">counter()  // 1</text>
  <text x="230" y="340" fill="#8b949e" font-size="11" text-anchor="middle">counter()  // 2</text>
  <text x="230" y="362" fill="#8b949e" font-size="10" text-anchor="middle">estado vivo mientras exista la referencia</text>

  <!-- Closure anotherCounter -->
  <rect x="430" y="250" width="280" height="130" rx="10" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="570" y="276" fill="#d29922" font-size="14" text-anchor="middle" font-weight="700">anotherCounter</text>
  <text x="570" y="298" fill="#e6edf3" font-size="12" text-anchor="middle" font-family="monospace">count propio: 0 → 1</text>
  <text x="570" y="320" fill="#8b949e" font-size="11" text-anchor="middle">anotherCounter()  // 1</text>
  <text x="570" y="362" fill="#8b949e" font-size="10" text-anchor="middle">NO comparte estado con counter</text>

  <!-- Leyenda -->
  <rect x="90" y="420" width="620" height="56" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="454" fill="#8b949e" font-size="12" text-anchor="middle">Cada llamada a la función-fábrica crea una variable capturada nueva e independiente.</text>
</svg>
