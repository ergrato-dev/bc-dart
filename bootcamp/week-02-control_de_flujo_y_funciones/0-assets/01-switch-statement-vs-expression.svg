<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>Comparación entre switch statement y switch expression en Dart</title>
  <desc>Diagrama de dos columnas: switch statement clásico con case y break, ejecuta efectos secundarios; switch expression de Dart 3, exhaustivo, devuelve un valor</desc>

  <rect width="900" height="420" fill="#0d1117"/>

  <!-- Encabezado -->
  <text x="450" y="36" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">switch statement vs switch expression</text>

  <!-- Columna izquierda: statement -->
  <rect x="40" y="70" width="380" height="320" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="230" y="100" fill="#40C4FF" font-size="16" font-weight="700" text-anchor="middle">switch statement</text>
  <text x="230" y="122" fill="#8b949e" font-size="12" text-anchor="middle">ejecuta efectos secundarios</text>

  <rect x="64" y="140" width="332" height="150" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="80" y="162" fill="#e6edf3" font-size="12" font-family="monospace">switch (eventCode) {</text>
  <text x="80" y="184" fill="#e6edf3" font-size="12" font-family="monospace">  case 1:</text>
  <text x="80" y="206" fill="#e6edf3" font-size="12" font-family="monospace">    print('Alta');</text>
  <text x="80" y="228" fill="#e6edf3" font-size="12" font-family="monospace">  default:</text>
  <text x="80" y="250" fill="#e6edf3" font-size="12" font-family="monospace">    print('Otro');</text>
  <text x="80" y="272" fill="#e6edf3" font-size="12" font-family="monospace">}</text>

  <rect x="64" y="304" width="332" height="70" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="230" y="328" fill="#d29922" font-size="12" text-anchor="middle" font-weight="700">no retorna valor</text>
  <text x="230" y="348" fill="#8b949e" font-size="11" text-anchor="middle">fallthrough implícito prohibido</text>
  <text x="230" y="364" fill="#8b949e" font-size="11" text-anchor="middle">(solo case vacío puede caer)</text>

  <!-- Columna derecha: expression -->
  <rect x="480" y="70" width="380" height="320" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="670" y="100" fill="#40C4FF" font-size="16" font-weight="700" text-anchor="middle">switch expression</text>
  <text x="670" y="122" fill="#8b949e" font-size="12" text-anchor="middle">produce un valor</text>

  <rect x="504" y="140" width="332" height="150" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="520" y="162" fill="#e6edf3" font-size="12" font-family="monospace">switch (eventCode) {</text>
  <text x="520" y="184" fill="#e6edf3" font-size="12" font-family="monospace">  1 => 'Alta',</text>
  <text x="520" y="206" fill="#e6edf3" font-size="12" font-family="monospace">  2 => 'Renovación',</text>
  <text x="520" y="228" fill="#e6edf3" font-size="12" font-family="monospace">  _ => 'Desconocido',</text>
  <text x="520" y="250" fill="#e6edf3" font-size="12" font-family="monospace">}</text>

  <rect x="504" y="304" width="332" height="70" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="670" y="328" fill="#3fb950" font-size="12" text-anchor="middle" font-weight="700">exhaustividad verificada</text>
  <text x="670" y="348" fill="#8b949e" font-size="11" text-anchor="middle">en tiempo de compilación</text>
  <text x="670" y="364" fill="#8b949e" font-size="11" text-anchor="middle">(el comodín _ cubre el resto)</text>

  <!-- Flecha comparativa central -->
  <line x1="420" y1="230" x2="480" y2="230" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="3 3"/>
</svg>
