<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>Jerarquía sellada de OperationResult y su switch exhaustivo</title>
  <desc>Diagrama de árbol: sealed class OperationResult con dos subtipos Success y Failure, ambos declarados en la misma biblioteca, y un switch expression que los cubre sin necesitar un caso comodín</desc>

  <rect width="800" height="450" fill="#0d1117"/>

  <text x="400" y="34" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">sealed class OperationResult&lt;T&gt;</text>
  <text x="400" y="54" fill="#8b949e" font-size="12" text-anchor="middle">ambos subtipos viven en el mismo archivo</text>

  <!-- Root -->
  <rect x="300" y="80" width="200" height="50" rx="8" fill="#161b22" stroke="#40C4FF" stroke-width="1.5"/>
  <text x="400" y="110" fill="#40C4FF" font-size="13" text-anchor="middle" font-family="monospace">OperationResult&lt;T&gt;</text>

  <line x1="360" y1="130" x2="220" y2="180" stroke="#8b949e" stroke-width="2"/>
  <line x1="440" y1="130" x2="580" y2="180" stroke="#8b949e" stroke-width="2"/>

  <!-- Success -->
  <rect x="100" y="180" width="240" height="60" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="220" y="206" fill="#3fb950" font-size="13" text-anchor="middle" font-family="monospace">Success&lt;T&gt;</text>
  <text x="220" y="224" fill="#8b949e" font-size="11" text-anchor="middle">final T value</text>

  <!-- Failure -->
  <rect x="460" y="180" width="240" height="60" rx="8" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <text x="580" y="206" fill="#f85149" font-size="13" text-anchor="middle" font-family="monospace">Failure&lt;T&gt;</text>
  <text x="580" y="224" fill="#8b949e" font-size="11" text-anchor="middle">final String message</text>

  <line x1="220" y1="240" x2="220" y2="290" stroke="#3fb950" stroke-width="2"/>
  <line x1="580" y1="240" x2="580" y2="290" stroke="#f85149" stroke-width="2"/>

  <!-- switch -->
  <rect x="130" y="290" width="540" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="400" y="314" fill="#ffffff" font-size="12" text-anchor="middle" font-family="monospace">switch (result) {</text>
  <text x="400" y="334" fill="#3fb950" font-size="12" text-anchor="middle" font-family="monospace">Success(:final value) =&gt; 'OK: $value',</text>
  <text x="400" y="354" fill="#f85149" font-size="12" text-anchor="middle" font-family="monospace">Failure(:final message) =&gt; 'Error: $message',</text>
  <text x="400" y="374" fill="#ffffff" font-size="12" text-anchor="middle" font-family="monospace">}</text>

  <!-- legend -->
  <rect x="220" y="405" width="360" height="34" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1"/>
  <text x="400" y="427" fill="#d29922" font-size="11" text-anchor="middle">sin `_`: el analyzer exige cubrir ambos subtipos</text>
</svg>
