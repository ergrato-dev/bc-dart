<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>Comparación entre extends (herencia) e implements (contrato)</title>
  <desc>Diagrama de dos columnas: extends hereda campos y métodos de una clase abstracta LibraryItem; implements solo adopta el contrato y exige reimplementar todo</desc>

  <rect width="900" height="420" fill="#0d1117"/>

  <text x="450" y="34" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">extends vs implements</text>

  <!-- extends column -->
  <rect x="40" y="64" width="380" height="330" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="230" y="92" fill="#3fb950" font-size="15" font-weight="700" text-anchor="middle">extends</text>
  <text x="230" y="112" fill="#8b949e" font-size="11" text-anchor="middle">hereda implementación</text>

  <rect x="60" y="128" width="340" height="60" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="230" y="152" fill="#e6edf3" font-size="12" text-anchor="middle" font-family="monospace">abstract class LibraryItem</text>
  <text x="230" y="172" fill="#8b949e" font-size="10" text-anchor="middle">describe() con implementación base</text>

  <line x1="230" y1="188" x2="230" y2="216" stroke="#3fb950" stroke-width="2"/>

  <rect x="60" y="220" width="340" height="60" rx="6" fill="#0d1117" stroke="#3fb950"/>
  <text x="230" y="244" fill="#e6edf3" font-size="12" text-anchor="middle" font-family="monospace">class Book extends LibraryItem</text>
  <text x="230" y="264" fill="#8b949e" font-size="10" text-anchor="middle">usa describe() heredado, sin reescribirlo</text>

  <rect x="60" y="300" width="340" height="70" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="230" y="326" fill="#8b949e" font-size="11" text-anchor="middle">solo una clase base</text>
  <text x="230" y="344" fill="#8b949e" font-size="11" text-anchor="middle">(sin herencia múltiple)</text>
  <text x="230" y="362" fill="#8b949e" font-size="11" text-anchor="middle">super reenvía constructor</text>

  <!-- implements column -->
  <rect x="480" y="64" width="380" height="330" rx="10" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="670" y="92" fill="#d29922" font-size="15" font-weight="700" text-anchor="middle">implements</text>
  <text x="670" y="112" fill="#8b949e" font-size="11" text-anchor="middle">solo adopta el contrato</text>

  <rect x="500" y="128" width="340" height="60" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="670" y="152" fill="#e6edf3" font-size="12" text-anchor="middle" font-family="monospace">class LibraryItem</text>
  <text x="670" y="172" fill="#8b949e" font-size="10" text-anchor="middle">define la forma (interfaz implícita)</text>

  <line x1="670" y1="188" x2="670" y2="216" stroke="#d29922" stroke-width="2" stroke-dasharray="4 3"/>

  <rect x="500" y="220" width="340" height="60" rx="6" fill="#0d1117" stroke="#d29922"/>
  <text x="670" y="244" fill="#e6edf3" font-size="12" text-anchor="middle" font-family="monospace">class Book implements LibraryItem</text>
  <text x="670" y="264" fill="#8b949e" font-size="10" text-anchor="middle">reimplementa describe() desde cero</text>

  <rect x="500" y="300" width="340" height="70" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="670" y="326" fill="#8b949e" font-size="11" text-anchor="middle">varias interfaces a la vez</text>
  <text x="670" y="344" fill="#8b949e" font-size="11" text-anchor="middle">implements A, B, C</text>
  <text x="670" y="362" fill="#8b949e" font-size="11" text-anchor="middle">nada se hereda</text>
</svg>
