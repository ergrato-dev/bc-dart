<svg width="700" height="600" viewBox="0 0 700 600" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>Anatomía de una clase Dart</title>
  <desc>Diagrama de la clase Book mostrando sus partes: campos, constructor, getter, setter, método y miembro estático, cada uno señalado con su rol</desc>

  <rect width="700" height="600" fill="#0d1117"/>

  <text x="350" y="36" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">Anatomía de la clase Book</text>

  <rect x="60" y="60" width="580" height="500" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="80" y="88" fill="#40C4FF" font-size="15" font-family="monospace" font-weight="700">class Book {</text>

  <!-- Campo estático -->
  <rect x="80" y="100" width="540" height="34" rx="4" fill="#0d1117" stroke="#d29922" stroke-width="1"/>
  <text x="90" y="122" fill="#e6edf3" font-size="12" font-family="monospace">static int totalCreated = 0;</text>
  <text x="500" y="122" fill="#d29922" font-size="10" text-anchor="end">← estático (de la clase)</text>

  <!-- Constructor -->
  <rect x="80" y="140" width="540" height="60" rx="4" fill="#0d1117" stroke="#3fb950" stroke-width="1"/>
  <text x="90" y="162" fill="#e6edf3" font-size="12" font-family="monospace">Book(this.title, this._availableCopies) {</text>
  <text x="90" y="182" fill="#e6edf3" font-size="12" font-family="monospace">  Book.totalCreated++;</text>
  <text x="500" y="172" fill="#3fb950" font-size="10" text-anchor="end">← constructor</text>

  <!-- Campos -->
  <rect x="80" y="210" width="540" height="60" rx="4" fill="#0d1117" stroke="#40C4FF" stroke-width="1"/>
  <text x="90" y="232" fill="#e6edf3" font-size="12" font-family="monospace">final String title;</text>
  <text x="90" y="252" fill="#e6edf3" font-size="12" font-family="monospace">int _availableCopies;</text>
  <text x="500" y="242" fill="#40C4FF" font-size="10" text-anchor="end">← campos (_ = privado)</text>

  <!-- Getter -->
  <rect x="80" y="280" width="540" height="34" rx="4" fill="#0d1117" stroke="#40C4FF" stroke-width="1"/>
  <text x="90" y="302" fill="#e6edf3" font-size="12" font-family="monospace">int get availableCopies =&gt; _availableCopies;</text>
  <text x="500" y="302" fill="#40C4FF" font-size="10" text-anchor="end">← getter</text>

  <!-- Setter -->
  <rect x="80" y="322" width="540" height="60" rx="4" fill="#0d1117" stroke="#40C4FF" stroke-width="1"/>
  <text x="90" y="344" fill="#e6edf3" font-size="12" font-family="monospace">set availableCopies(int value) {</text>
  <text x="90" y="364" fill="#e6edf3" font-size="12" font-family="monospace">  if (value &gt;= 0) _availableCopies = value;</text>
  <text x="500" y="354" fill="#40C4FF" font-size="10" text-anchor="end">← setter</text>

  <!-- Método -->
  <rect x="80" y="392" width="540" height="34" rx="4" fill="#0d1117" stroke="#f85149" stroke-width="1"/>
  <text x="90" y="414" fill="#e6edf3" font-size="12" font-family="monospace">void loan() { _availableCopies--; }</text>
  <text x="500" y="414" fill="#f85149" font-size="10" text-anchor="end">← método de instancia</text>

  <text x="80" y="450" fill="#40C4FF" font-size="15" font-family="monospace" font-weight="700">}</text>

  <!-- Leyenda -->
  <rect x="80" y="470" width="540" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="350" y="496" fill="#8b949e" font-size="11" text-anchor="middle">campos/getter/setter/método → dependen de CADA instancia (this)</text>
  <text x="350" y="516" fill="#8b949e" font-size="11" text-anchor="middle">static → un solo valor compartido por TODAS las instancias</text>
</svg>
