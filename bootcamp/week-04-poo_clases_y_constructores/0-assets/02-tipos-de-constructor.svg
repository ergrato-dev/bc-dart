<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>Los cuatro tipos de constructor en Dart y cuándo usar cada uno</title>
  <desc>Diagrama de cuatro columnas: constructor normal, nombrado, const y factory, cada uno con su sintaxis y su caso de uso principal</desc>

  <rect width="900" height="420" fill="#0d1117"/>

  <text x="450" y="34" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">Tipos de constructor</text>

  <!-- Normal -->
  <rect x="20" y="60" width="205" height="330" rx="10" fill="#161b22" stroke="#40C4FF" stroke-width="1.5"/>
  <text x="122" y="88" fill="#40C4FF" font-size="14" font-weight="700" text-anchor="middle">Normal</text>
  <rect x="36" y="104" width="173" height="60" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="45" y="126" fill="#e6edf3" font-size="10" font-family="monospace">Book(this.title,</text>
  <text x="45" y="142" fill="#e6edf3" font-size="10" font-family="monospace">     this.author);</text>
  <text x="122" y="188" fill="#8b949e" font-size="10" text-anchor="middle">caso general</text>
  <text x="122" y="204" fill="#8b949e" font-size="10" text-anchor="middle">todos los campos</text>
  <text x="122" y="220" fill="#8b949e" font-size="10" text-anchor="middle">como parámetros</text>

  <!-- Nombrado -->
  <rect x="235" y="60" width="205" height="330" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="337" y="88" fill="#3fb950" font-size="14" font-weight="700" text-anchor="middle">Nombrado</text>
  <rect x="251" y="104" width="173" height="60" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="260" y="126" fill="#e6edf3" font-size="10" font-family="monospace">Book.outOfStock(</text>
  <text x="260" y="142" fill="#e6edf3" font-size="10" font-family="monospace">  this.title);</text>
  <text x="337" y="188" fill="#8b949e" font-size="10" text-anchor="middle">variante con</text>
  <text x="337" y="204" fill="#8b949e" font-size="10" text-anchor="middle">intención explícita</text>
  <text x="337" y="220" fill="#8b949e" font-size="10" text-anchor="middle">en el nombre</text>

  <!-- Const -->
  <rect x="450" y="60" width="205" height="330" rx="10" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="552" y="88" fill="#d29922" font-size="14" font-weight="700" text-anchor="middle">Const</text>
  <rect x="466" y="104" width="173" height="60" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="475" y="126" fill="#e6edf3" font-size="10" font-family="monospace">const Genre(this.code,</text>
  <text x="475" y="142" fill="#e6edf3" font-size="10" font-family="monospace">  this.label);</text>
  <text x="552" y="188" fill="#8b949e" font-size="10" text-anchor="middle">todos los campos</text>
  <text x="552" y="204" fill="#8b949e" font-size="10" text-anchor="middle">final: instancias</text>
  <text x="552" y="220" fill="#8b949e" font-size="10" text-anchor="middle">deduplicadas</text>

  <!-- Factory -->
  <rect x="665" y="60" width="215" height="330" rx="10" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <text x="772" y="88" fill="#f85149" font-size="14" font-weight="700" text-anchor="middle">Factory</text>
  <rect x="681" y="104" width="183" height="76" rx="4" fill="#0d1117" stroke="#30363d"/>
  <text x="690" y="126" fill="#e6edf3" font-size="10" font-family="monospace">factory Book.fromRecord(</text>
  <text x="690" y="142" fill="#e6edf3" font-size="10" font-family="monospace">  Map record) {</text>
  <text x="690" y="158" fill="#e6edf3" font-size="10" font-family="monospace">  // validar, parsear</text>
  <text x="772" y="200" fill="#8b949e" font-size="10" text-anchor="middle">valida/transforma</text>
  <text x="772" y="216" fill="#8b949e" font-size="10" text-anchor="middle">antes de construir,</text>
  <text x="772" y="232" fill="#8b949e" font-size="10" text-anchor="middle">puede cachear o</text>
  <text x="772" y="248" fill="#8b949e" font-size="10" text-anchor="middle">elegir subclase</text>

  <!-- pie -->
  <rect x="20" y="360" width="860" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="385" fill="#8b949e" font-size="11" text-anchor="middle">Los tres primeros siempre crean una instancia nueva. factory decide QUÉ retornar.</text>
</svg>
