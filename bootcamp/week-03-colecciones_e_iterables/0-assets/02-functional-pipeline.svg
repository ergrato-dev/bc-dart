<svg width="900" height="350" viewBox="0 0 900 350" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>Pipeline funcional: where, map y fold encadenados</title>
  <desc>Diagrama de flujo horizontal: una colección de entrada pasa por where (filtra), luego map (transforma), y termina en fold (reduce a un único valor)</desc>

  <rect width="900" height="350" fill="#0d1117"/>

  <text x="450" y="36" fill="#ffffff" font-size="20" font-weight="700" text-anchor="middle">where → map → fold</text>

  <!-- Entrada -->
  <rect x="30" y="140" width="150" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="105" y="170" fill="#e6edf3" font-size="12" text-anchor="middle" font-family="monospace">[3, 0, 1, 5]</text>
  <text x="105" y="190" fill="#8b949e" font-size="10" text-anchor="middle">copias por título</text>

  <line x1="180" y1="175" x2="230" y2="175" stroke="#8b949e" stroke-width="2"/>

  <!-- where -->
  <rect x="230" y="130" width="150" height="90" rx="8" fill="#161b22" stroke="#40C4FF" stroke-width="1.5"/>
  <text x="305" y="158" fill="#40C4FF" font-size="14" text-anchor="middle" font-weight="700">.where</text>
  <text x="305" y="178" fill="#e6edf3" font-size="11" text-anchor="middle" font-family="monospace">c &gt; 0</text>
  <text x="305" y="198" fill="#8b949e" font-size="10" text-anchor="middle">filtra → [3, 1, 5]</text>

  <line x1="380" y1="175" x2="430" y2="175" stroke="#8b949e" stroke-width="2"/>

  <!-- map -->
  <rect x="430" y="130" width="150" height="90" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="505" y="158" fill="#d29922" font-size="14" text-anchor="middle" font-weight="700">.map</text>
  <text x="505" y="178" fill="#e6edf3" font-size="11" text-anchor="middle" font-family="monospace">c * 2</text>
  <text x="505" y="198" fill="#8b949e" font-size="10" text-anchor="middle">transforma → [6, 2, 10]</text>

  <line x1="580" y1="175" x2="630" y2="175" stroke="#8b949e" stroke-width="2"/>

  <!-- fold -->
  <rect x="630" y="130" width="150" height="90" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="705" y="158" fill="#3fb950" font-size="14" text-anchor="middle" font-weight="700">.fold</text>
  <text x="705" y="178" fill="#e6edf3" font-size="11" text-anchor="middle" font-family="monospace">0, (a, c) =&gt; a + c</text>
  <text x="705" y="198" fill="#8b949e" font-size="10" text-anchor="middle">reduce → 18</text>

  <line x1="780" y1="175" x2="830" y2="175" stroke="#8b949e" stroke-width="2"/>
  <rect x="820" y="150" width="55" height="50" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="847" y="180" fill="#3fb950" font-size="16" text-anchor="middle" font-weight="700">18</text>

  <!-- leyenda -->
  <rect x="230" y="250" width="550" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="505" y="275" fill="#8b949e" font-size="11" text-anchor="middle">where y map son perezosos (lazy): no se ejecutan hasta que fold los consume.</text>
  <text x="505" y="295" fill="#8b949e" font-size="11" text-anchor="middle">Cada paso produce un Iterable nuevo — la colección original nunca se modifica.</text>
</svg>
